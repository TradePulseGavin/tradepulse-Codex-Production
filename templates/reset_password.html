<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/style.css" /><title>Choose new password - TradePulse</title></head>
  <body data-page="reset-password">
    <nav class="topnav"><a class="brand" href="/">TradePulse</a><div class="navlinks"><a href="/pricing">Pricing</a><a href="/login">Login</a></div></nav>
    <main class="auth-shell"><section class="panel auth-card"><p class="eyebrow">Account recovery</p><h1>Choose a new password</h1><p class="subtitle">Open this page from your Supabase reset email, then set a new password for your TradePulse account.</p><form id="password-update-form" class="stack"><label>New password<input id="new-password" type="password" required minlength="6" placeholder="At least 6 characters" /></label><label>Confirm password<input id="confirm-password" type="password" required minlength="6" placeholder="Repeat password" /></label><button type="submit">Update password</button></form><p id="password-reset-message" class="response-box hidden"></p><p><a href="/login">Back to login</a></p></section></main>
    <script>window.TRADEPULSE_PASSWORD_RESET_MODE = "update"; window.TRADEPULSE_SUPABASE_URL = "{{ supabase_url }}"; window.TRADEPULSE_SUPABASE_KEY = "{{ supabase_publishable_key }}";</script><script src="/static/password_reset.js"></script>
  </body>
</html>
