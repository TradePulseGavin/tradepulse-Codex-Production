<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/style.css" /><title>Reset password - TradePulse</title></head>
  <body data-page="forgot-password">
    <nav class="topnav"><a class="brand" href="/">TradePulse</a><div class="navlinks"><a href="/pricing">Pricing</a><a href="/login">Login</a></div></nav>
    <main class="auth-shell"><section class="panel auth-card"><p class="eyebrow">Account help</p><h1>Reset your password</h1><p class="subtitle">Enter your account email and TradePulse will ask Supabase to send a secure reset link.</p><form id="password-reset-request-form" class="stack"><label>Email<input id="reset-email" type="email" required placeholder="you@example.com" /></label><button type="submit">Send reset link</button></form><p id="password-reset-message" class="response-box hidden"></p><p><a href="/login">Back to login</a></p></section></main>
    <script>window.TRADEPULSE_PASSWORD_RESET_MODE = "request"; window.TRADEPULSE_SUPABASE_URL = "{{ supabase_url }}"; window.TRADEPULSE_SUPABASE_KEY = "{{ supabase_publishable_key }}";</script><script src="/static/password_reset.js"></script>
  </body>
</html>
